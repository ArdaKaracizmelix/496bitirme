services:
  db:
    image: postgis/postgis:16-3.4
    container_name: excursa_db
    restart: always
    environment:
      POSTGRES_DB: excursa
      POSTGRES_USER: excursa_user
      POSTGRES_PASSWORD: excursa_pass
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excursa_user -d excursa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - excursa_network

  mongo:
    image: mongo:latest
    container_name: excursa_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_pass
      MONGO_INITDB_DATABASE: excursa_community
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" --quiet | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - excursa_network

  redis:
    image: redis:7-alpine
    container_name: excursa_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - excursa_network

  backend:
    build: ./backend
    container_name: excursa_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      # Django Settings
      - DEBUG=True
      - PYTHONUNBUFFERED=1
      # GDAL Configuration
      - GDAL_CONFIG=/usr/bin/gdal-config
      # Database Configuration (PostgreSQL)
      - DB_ENGINE=django.contrib.gis.db.backends.postgis
      - DB_NAME=excursa
      - DB_USER=excursa_user
      - DB_PASSWORD=excursa_pass
      - DB_HOST=db
      - DB_PORT=5432
      # MongoDB Configuration (Community App)
      - MONGO_DB_NAME=excursa_community
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_USER=admin
      - MONGO_PASSWORD=admin_pass
      # Redis Configuration
      - REDIS_URL=redis://redis:6379/0
      - REDIS_KEY_PREFIX=excursa
      # JWT Configuration
      - JWT_ACCESS_TOKEN_LIFETIME_MINUTES=${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      - JWT_REFRESH_TOKEN_LIFETIME_DAYS=${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
      - JWT_ROTATE_REFRESH_TOKENS=${JWT_ROTATE_REFRESH_TOKENS:-False}
      # Email Configuration
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@excursa.com}
      # External API Keys (from .env file or secrets)
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - FOURSQUARE_API_KEY=${FOURSQUARE_API_KEY:-}
      # AWS Configuration
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_REGION_NAME=${AWS_S3_REGION_NAME:-us-east-1}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-excursa-uploads}
      - AWS_CDN_DOMAIN=${AWS_CDN_DOMAIN:-}
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - excursa_network

volumes:
  postgres_data:
  mongo_data:

networks:
  excursa_network:
    driver: bridge
